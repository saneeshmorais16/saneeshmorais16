<svg width="980" height="320" viewBox="0 0 980 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI Code Review Tool animated developer tooling project card</title>
  <desc id="desc">Reviews code for bugs, security risks, complexity and maintainability improvements.</desc>
  <defs><radialGradient id="bg" cx="75%" cy="28%" r="72%"><stop offset="0" stop-color="#1E1B4B"/><stop offset=".46" stop-color="#0B1220"/><stop offset="1" stop-color="#020617"/></radialGradient><linearGradient id="border" x1="0" y1="0" x2="980" y2="320"><stop stop-color="#38BDF8"/><stop offset="1" stop-color="#8B5CF6"><animate attributeName="stop-color" values="#8B5CF6;#00D1B2;#38BDF8;#8B5CF6" dur="10s" repeatCount="indefinite"/></stop></linearGradient><pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M32 0H0V32" stroke="#38BDF8" stroke-opacity=".08"/></pattern></defs>
  <rect x="8" y="8" width="964" height="304" rx="28" fill="url(#bg)" stroke="url(#border)" stroke-width="2.5"/><rect x="24" y="24" width="932" height="272" rx="22" fill="url(#grid)" opacity=".9"/><rect x="34" y="42" width="912" height="2" fill="#38BDF8" opacity=".13"><animate attributeName="y" values="42;278;42" dur="8s" repeatCount="indefinite"/></rect>
  <rect x="48" y="48" width="218" height="34" rx="17" fill="#111827" stroke="#38BDF8" stroke-opacity=".75"/><text x="66" y="70" fill="#BAE6FD" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Developer Tooling / AI Software</text>
  <rect x="844" y="48" width="82" height="34" rx="17" fill="#052E2B" stroke="#00D1B2" stroke-opacity=".8"/><text x="865" y="70" fill="#99F6E4" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="800">Public</text>
  <text x="48" y="128" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="800">AI Code Review Tool</text>
  <text x="50" y="168" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="20">Reviews code for bugs, security risks, complexity and maintainability improvements.</text>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700"><rect x="48" y="232" width="78" height="32" rx="16" fill="#111827" stroke="#38BDF8"/><text x="67" y="253" fill="#BAE6FD">Python</text><rect x="136" y="232" width="82" height="32" rx="16" fill="#0F766E"/><text x="154" y="253" fill="#ECFEFF">FastAPI</text><rect x="228" y="232" width="76" height="32" rx="16" fill="#1E3A8A"/><text x="247" y="253" fill="#DBEAFE">SQLite</text><rect x="314" y="232" width="166" height="32" rx="16" fill="#312E81"/><text x="334" y="253" fill="#E0E7FF">Structured Outputs</text></g>
  <g transform="translate(626 82)">
    <rect x="0" y="0" width="326" height="200" rx="20" fill="#111827" stroke="#38BDF8"/>
    <circle cx="26" cy="24" r="5" fill="#F87171"/><circle cx="44" cy="24" r="5" fill="#FBBF24"/><circle cx="62" cy="24" r="5" fill="#34D399"/>
    <text x="28" y="66" fill="#94A3B8" font-family="Consolas, monospace" font-size="17">def review(code):</text>
    <text x="48" y="96" fill="#38BDF8" font-family="Consolas, monospace" font-size="17">scan_security()</text>
    <text x="48" y="126" fill="#00D1B2" font-family="Consolas, monospace" font-size="17">rank_findings()</text>
    <text x="48" y="156" fill="#DDD6FE" font-family="Consolas, monospace" font-size="17">return structured_json</text>
    <circle cx="286" cy="76" r="8" fill="#FBBF24"><animate attributeName="opacity" values=".35;1;.35" dur="1.8s" repeatCount="indefinite"/></circle>
    <rect x="218" y="104" width="72" height="28" rx="14" fill="#1F1B12" stroke="#FBBF24"/><text x="236" y="123" fill="#FEF3C7" font-family="Segoe UI, Arial" font-size="12" font-weight="800">RISK</text>
    <rect x="218" y="142" width="72" height="28" rx="14" fill="#052E2B" stroke="#00D1B2"/><text x="235" y="161" fill="#99F6E4" font-family="Segoe UI, Arial" font-size="12" font-weight="800">FIX</text>
  </g>
  <text x="48" y="292" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="13">SYSTEM STATUS: code scan | security flags | structured review output</text>
</svg>
