<svg width="760" height="260" viewBox="0 0 760 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI Code Review Tool project card</title>
  <desc id="desc">Reviews code for bugs, security risks, complexity and maintainability improvements.</desc>
  <defs><linearGradient id="border" x1="0" y1="0" x2="760" y2="260"><stop offset="0%" stop-color="#38BDF8"/><stop offset="100%" stop-color="#8B5CF6"><animate attributeName="stop-color" values="#8B5CF6;#00D1B2;#38BDF8;#8B5CF6" dur="8s" repeatCount="indefinite"/></stop></linearGradient></defs>
  <rect x="8" y="8" width="744" height="244" rx="22" fill="#020617" stroke="url(#border)" stroke-width="2"/><rect x="18" y="18" width="724" height="224" rx="18" fill="#0B1220" opacity=".88"/>
  <rect x="28" y="44" width="704" height="1.2" fill="#38BDF8" opacity=".14"><animate attributeName="y" values="44;218;44" dur="7s" repeatCount="indefinite"/></rect>
  <g transform="translate(54 58)">
    <rect x="0" y="0" width="190" height="112" rx="14" fill="#111827" stroke="#38BDF8"/>
    <circle cx="20" cy="18" r="4" fill="#F87171"/><circle cx="34" cy="18" r="4" fill="#FBBF24"/><circle cx="48" cy="18" r="4" fill="#34D399"/>
    <text x="18" y="48" fill="#94A3B8" font-family="Consolas, monospace" font-size="15">def review(code):</text>
    <text x="34" y="72" fill="#38BDF8" font-family="Consolas, monospace" font-size="15">scan_security()</text>
    <text x="34" y="96" fill="#00D1B2" font-family="Consolas, monospace" font-size="15">return feedback</text>
    <circle cx="170" cy="48" r="7" fill="#FBBF24"><animate attributeName="opacity" values=".35;1;.35" dur="1.7s" repeatCount="indefinite"/></circle>
  </g>
  <text x="280" y="66" fill="#E5E7EB" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">AI Code Review Tool</text>
  <text x="280" y="94" fill="#38BDF8" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">STATIC ANALYSIS / SECURITY / FEEDBACK</text>
  <rect x="628" y="48" width="76" height="30" rx="15" fill="#052E2B" stroke="#00D1B2"/><text x="649" y="68" fill="#99F6E4" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Public</text>
  <text x="280" y="132" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="18">Reviews code for bugs, security risks, complexity and</text><text x="280" y="157" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="18">maintainability improvements with structured output.</text>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700"><rect x="280" y="184" width="66" height="28" rx="14" fill="#111827" stroke="#38BDF8"/><text x="296" y="203" fill="#BAE6FD">Python</text><rect x="356" y="184" width="72" height="28" rx="14" fill="#0F766E"/><text x="374" y="203" fill="#ECFEFF">FastAPI</text><rect x="438" y="184" width="64" height="28" rx="14" fill="#1E3A8A"/><text x="454" y="203" fill="#DBEAFE">SQLite</text><rect x="512" y="184" width="142" height="28" rx="14" fill="#312E81"/><text x="530" y="203" fill="#E0E7FF">Structured Outputs</text></g>
</svg>
