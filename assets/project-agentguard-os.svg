<svg width="980" height="320" viewBox="0 0 980 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AgentGuard OS animated AI governance project card</title>
  <desc id="desc">Prompt attack detection, risk scoring, approval queues and audit trails for safer AI agents.</desc>
  <defs>
    <radialGradient id="bg" cx="75%" cy="25%" r="70%"><stop offset="0" stop-color="#12335F"/><stop offset=".45" stop-color="#0B1220"/><stop offset="1" stop-color="#020617"/></radialGradient>
    <linearGradient id="border" x1="0" y1="0" x2="980" y2="320"><stop stop-color="#00D1B2"><animate attributeName="stop-color" values="#00D1B2;#38BDF8;#8B5CF6;#00D1B2" dur="10s" repeatCount="indefinite"/></stop><stop offset="1" stop-color="#8B5CF6"><animate attributeName="stop-color" values="#8B5CF6;#00D1B2;#38BDF8;#8B5CF6" dur="10s" repeatCount="indefinite"/></stop></linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M32 0H0V32" stroke="#38BDF8" stroke-opacity=".08"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect x="8" y="8" width="964" height="304" rx="28" fill="url(#bg)" stroke="url(#border)" stroke-width="2.5"/>
  <rect x="24" y="24" width="932" height="272" rx="22" fill="url(#grid)" opacity=".9"/>
  <rect x="34" y="42" width="912" height="2" fill="#38BDF8" opacity=".13"><animate attributeName="y" values="42;278;42" dur="8s" repeatCount="indefinite"/></rect>
  <circle cx="790" cy="64" r="120" fill="#00D1B2" opacity=".07"/><circle cx="880" cy="250" r="90" fill="#8B5CF6" opacity=".08"/>
  <rect x="48" y="48" width="224" height="34" rx="17" fill="#061B2A" stroke="#00D1B2" stroke-opacity=".65"/><text x="66" y="70" fill="#99F6E4" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">AI Governance / Agent Security</text>
  <rect x="794" y="48" width="132" height="34" rx="17" fill="#121826" stroke="#8B5CF6" stroke-opacity=".75"/><text x="813" y="70" fill="#DDD6FE" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Private / in progress</text>
  <text x="48" y="128" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="800">AgentGuard OS</text>
  <text x="50" y="168" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="20">Prompt attack detection, risk scoring, approval queues and audit trails for safer AI agents.</text>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">
    <rect x="48" y="232" width="82" height="32" rx="16" fill="#0F766E"/><text x="66" y="253" fill="#ECFEFF">FastAPI</text>
    <rect x="140" y="232" width="76" height="32" rx="16" fill="#1E3A8A"/><text x="159" y="253" fill="#DBEAFE">SQLite</text>
    <rect x="226" y="232" width="78" height="32" rx="16" fill="#111827" stroke="#38BDF8"/><text x="245" y="253" fill="#BAE6FD">Python</text>
    <rect x="314" y="232" width="106" height="32" rx="16" fill="#312E81"/><text x="334" y="253" fill="#E0E7FF">JavaScript</text>
  </g>
  <g transform="translate(672 102)" filter="url(#glow)">
    <path d="M92 0L166 28V94C166 151 130 190 92 210C54 190 18 151 18 94V28L92 0Z" fill="#042F2E" stroke="#00D1B2" stroke-width="4"/>
    <circle cx="92" cy="96" r="66" stroke="#38BDF8" stroke-opacity=".3" stroke-width="2"><animate attributeName="r" values="54;72;54" dur="4s" repeatCount="indefinite"/><animate attributeName="opacity" values=".25;.75;.25" dur="4s" repeatCount="indefinite"/></circle>
    <path d="M58 101L82 125L128 72" stroke="#F8FAFC" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="10" cy="110" r="6" fill="#FBBF24"><animate attributeName="opacity" values=".35;1;.35" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="188" cy="58" r="6" fill="#38BDF8"><animate attributeName="opacity" values="1;.35;1" dur="2.4s" repeatCount="indefinite"/></circle>
    <path d="M10 110H38M152 62H188M92 210V236" stroke="#38BDF8" stroke-opacity=".75" stroke-width="2" stroke-dasharray="6 8"><animate attributeName="stroke-dashoffset" values="0;-56" dur="3s" repeatCount="indefinite"/></path>
