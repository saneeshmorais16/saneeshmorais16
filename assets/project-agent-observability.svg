<svg width="760" height="260" viewBox="0 0 760 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI Agent Observability Dashboard project card</title>
  <desc id="desc">Monitors agent runs, tool calls, latency, cost, failures and prompt risks.</desc>
  <defs><linearGradient id="border" x1="0" y1="0" x2="760" y2="260"><stop offset="0%" stop-color="#00D1B2"/><stop offset="100%" stop-color="#38BDF8"><animate attributeName="stop-color" values="#38BDF8;#8B5CF6;#00D1B2;#38BDF8" dur="8s" repeatCount="indefinite"/></stop></linearGradient></defs>
  <rect x="8" y="8" width="744" height="244" rx="22" fill="#020617" stroke="url(#border)" stroke-width="2"/><rect x="18" y="18" width="724" height="224" rx="18" fill="#0B1220" opacity=".88"/>
  <rect x="28" y="42" width="704" height="1.2" fill="#00D1B2" opacity=".14"><animate attributeName="y" values="42;218;42" dur="7s" repeatCount="indefinite"/></rect>
  <g transform="translate(54 60)">
    <rect width="178" height="104" rx="14" fill="#111827" stroke="#38BDF8"/>
    <polyline points="14,80 44,58 72,70 103,34 135,46 162,22" fill="none" stroke="#00D1B2" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="260"><animate attributeName="stroke-dashoffset" values="260;0;260" dur="6s" repeatCount="indefinite"/></polyline>
    <circle cx="162" cy="22" r="6" fill="#FBBF24"><animate attributeName="opacity" values=".3;1;.3" dur="1.8s" repeatCount="indefinite"/></circle>
    <rect x="18" y="15" width="48" height="10" rx="5" fill="#1E3A8A"/><rect x="76" y="15" width="34" height="10" rx="5" fill="#0F766E"/><rect x="120" y="15" width="36" height="10" rx="5" fill="#312E81"/>
  </g>
  <text x="270" y="66" fill="#E5E7EB" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">AI Agent Observability Dashboard</text>
  <text x="270" y="94" fill="#00D1B2" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">TRACES / LATENCY / COST / RISK</text>
  <rect x="588" y="48" width="116" height="30" rx="15" fill="#111827" stroke="#8B5CF6"/><text x="607" y="68" fill="#C4B5FD" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Private / building</text>
  <text x="270" y="132" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="18">Monitors agent runs, tool calls, latency, cost, failures</text><text x="270" y="157" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="18">and risky prompts with audit-ready visibility.</text>
