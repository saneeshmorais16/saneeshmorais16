  <text x="260" y="132" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="18">Tests LLM outputs for accuracy, hallucination risk, safety,</text><text x="260" y="157" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="18">formatting, schema quality and regressions.</text>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700"><rect x="260" y="184" width="66" height="28" rx="14" fill="#111827" stroke="#38BDF8"/><text x="276" y="203" fill="#BAE6FD">Python</text><rect x="336" y="184" width="72" height="28" rx="14" fill="#0F766E"/><text x="354" y="203" fill="#ECFEFF">FastAPI</text><rect x="418" y="184" width="62" height="28" rx="14" fill="#1E3A8A"/><text x="435" y="203" fill="#DBEAFE">pytest</text><rect x="490" y="184" width="64" height="28" rx="14" fill="#312E81"/><text x="506" y="203" fill="#E0E7FF">SQLite</text></g>
