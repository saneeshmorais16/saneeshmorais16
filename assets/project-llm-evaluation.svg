    <rect x="18" y="20" width="30" height="60" rx="5" fill="#0F766E"><animate attributeName="height" values="42;68;42" dur="3s" repeatCount="indefinite"/><animate attributeName="y" values="38;12;38" dur="3s" repeatCount="indefinite"/></rect>
    <rect x="68" y="38" width="30" height="42" rx="5" fill="#38BDF8"><animate attributeName="height" values="32;54;32" dur="3.4s" repeatCount="indefinite"/><animate attributeName="y" values="48;26;48" dur="3.4s" repeatCount="indefinite"/></rect>
