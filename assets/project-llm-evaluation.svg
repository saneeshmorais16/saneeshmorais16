<svg width="760" height="260" viewBox="0 0 760 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">LLM Evaluation Harness project card</title>
  <desc id="desc">Tests LLM outputs for accuracy, hallucination risk, safety and formatting.</desc>
  <defs><linearGradient id="border" x1="0" y1="0" x2="760" y2="260"><stop offset="0%" stop-color="#00D1B2"/><stop offset="50%" stop-color="#38BDF8"><animate attributeName="stop-color" values="#38BDF8;#FBBF24;#8B5CF6;#38BDF8" dur="8s" repeatCount="indefinite"/></stop><stop offset="100%" stop-color="#8B5CF6"/></linearGradient></defs>
  <rect x="8" y="8" width="744" height="244" rx="22" fill="#020617" stroke="url(#border)" stroke-width="2"/><rect x="18" y="18" width="724" height="224" rx="18" fill="#0B1220" opacity=".88"/>
  <rect x="28" y="38" width="704" height="1.2" fill="#38BDF8" opacity=".14"><animate attributeName="y" values="38;222;38" dur="6.8s" repeatCount="indefinite"/></rect>
