<svg width="760" height="260" viewBox="0 0 760 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Multi-Agent Research Assistant project card</title>
  <desc id="desc">Agentic research workflow with planning, retrieval, critique and cited answers.</desc>
  <defs><linearGradient id="border" x1="0" y1="0" x2="760" y2="260"><stop offset="0%" stop-color="#8B5CF6"/><stop offset="100%" stop-color="#00D1B2"><animate attributeName="stop-color" values="#00D1B2;#38BDF8;#8B5CF6;#00D1B2" dur="9s" repeatCount="indefinite"/></stop></linearGradient></defs>
  <rect x="8" y="8" width="744" height="244" rx="22" fill="#020617" stroke="url(#border)" stroke-width="2"/><rect x="18" y="18" width="724" height="224" rx="18" fill="#0B1220" opacity=".88"/>
  <rect x="28" y="44" width="704" height="1.3" fill="#8B5CF6" opacity=".16"><animate attributeName="y" values="44;218;44" dur="7.2s" repeatCount="indefinite"/></rect>
  <g transform="translate(48 58)" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700">
    <path d="M58 50H122M148 36L188 18M148 64L188 86M214 52H248" stroke="#38BDF8" stroke-width="2" opacity=".75"/>
    <circle cx="42" cy="50" r="27" fill="#111827" stroke="#00D1B2"/><text x="21" y="54" fill="#CCFBF1">PLAN</text>
    <circle cx="148" cy="50" r="27" fill="#111827" stroke="#38BDF8"><animate attributeName="r" values="24;29;24" dur="3s" repeatCount="indefinite"/></circle><text x="126" y="54" fill="#BAE6FD">FETCH</text>
    <circle cx="210" cy="18" r="22" fill="#111827" stroke="#8B5CF6"/><text x="195" y="22" fill="#DDD6FE">CRIT</text>
    <circle cx="210" cy="86" r="22" fill="#111827" stroke="#FBBF24"/><text x="197" y="90" fill="#FEF3C7">CITE</text>
    <circle cx="274" cy="52" r="25" fill="#0F172A" stroke="#00D1B2"/><text x="257" y="56" fill="#ECFEFF">ANS</text>
  </g>
  <text x="360" y="66" fill="#E5E7EB" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Multi-Agent Research Assistant</text>
  <text x="360" y="94" fill="#38BDF8" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">PLANNER / RETRIEVER / CRITIC</text>
  <rect x="588" y="48" width="116" height="30" rx="15" fill="#111827" stroke="#8B5CF6"/><text x="607" y="68" fill="#C4B5FD" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Private / building</text>
  <text x="360" y="132" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="18">Agentic research workflow with planning, retrieval,</text><text x="360" y="157" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="18">critique, contradiction checks and cited answers.</text>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700"><rect x="360" y="184" width="66" height="28" rx="14" fill="#111827" stroke="#38BDF8"/><text x="376" y="203" fill="#BAE6FD">Python</text><rect x="436" y="184" width="72" height="28" rx="14" fill="#0F766E"/><text x="454" y="203" fill="#ECFEFF">FastAPI</text><rect x="518" y="184" width="106" height="28" rx="14" fill="#1E3A8A"/><text x="535" y="203" fill="#DBEAFE">Vector Search</text></g>
