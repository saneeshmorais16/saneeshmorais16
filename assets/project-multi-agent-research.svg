<svg width="980" height="320" viewBox="0 0 980 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Multi-Agent Research Assistant animated agentic AI project card</title>
  <desc id="desc">Planner, retriever, critic and final-answer agents for cited research workflows.</desc>
  <defs><radialGradient id="bg" cx="76%" cy="28%" r="72%"><stop offset="0" stop-color="#172554"/><stop offset=".46" stop-color="#0B1220"/><stop offset="1" stop-color="#020617"/></radialGradient><linearGradient id="border" x1="0" y1="0" x2="980" y2="320"><stop stop-color="#8B5CF6"><animate attributeName="stop-color" values="#8B5CF6;#38BDF8;#00D1B2;#8B5CF6" dur="10s" repeatCount="indefinite"/></stop><stop offset="1" stop-color="#00D1B2"/></linearGradient><pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M32 0H0V32" stroke="#38BDF8" stroke-opacity=".08"/></pattern><filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <rect x="8" y="8" width="964" height="304" rx="28" fill="url(#bg)" stroke="url(#border)" stroke-width="2.5"/><rect x="24" y="24" width="932" height="272" rx="22" fill="url(#grid)" opacity=".9"/><rect x="34" y="42" width="912" height="2" fill="#8B5CF6" opacity=".13"><animate attributeName="y" values="42;278;42" dur="8.2s" repeatCount="indefinite"/></rect>
  <rect x="48" y="48" width="238" height="34" rx="17" fill="#111827" stroke="#8B5CF6" stroke-opacity=".75"/><text x="66" y="70" fill="#DDD6FE" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Agentic AI / Research Automation</text>
  <rect x="794" y="48" width="132" height="34" rx="17" fill="#121826" stroke="#8B5CF6" stroke-opacity=".75"/><text x="813" y="70" fill="#DDD6FE" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Private / in progress</text>
  <text x="48" y="128" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="800">Multi-Agent Research Assistant</text>
  <text x="50" y="168" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="20">Planner, retriever, critic and final-answer agents for cited research workflows.</text>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700"><rect x="48" y="232" width="78" height="32" rx="16" fill="#111827" stroke="#38BDF8"/><text x="67" y="253" fill="#BAE6FD">Python</text><rect x="136" y="232" width="82" height="32" rx="16" fill="#0F766E"/><text x="154" y="253" fill="#ECFEFF">FastAPI</text><rect x="228" y="232" width="122" height="32" rx="16" fill="#1E3A8A"/><text x="248" y="253" fill="#DBEAFE">Vector Search</text><rect x="360" y="232" width="166" height="32" rx="16" fill="#312E81"/><text x="379" y="253" fill="#E0E7FF">Structured Outputs</text></g>
  <g transform="translate(652 86)" filter="url(#glow)" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="800">
    <path d="M96 96H164M202 78L258 44M202 114L258 150M296 98H340" stroke="#38BDF8" stroke-width="3" stroke-dasharray="8 10"><animate attributeName="stroke-dashoffset" values="0;-72" dur="3.4s" repeatCount="indefinite"/></path>
    <circle cx="62" cy="96" r="42" fill="#111827" stroke="#00D1B2" stroke-width="2"/><text x="31" y="101" fill="#CCFBF1">PLAN</text>
    <circle cx="194" cy="96" r="42" fill="#111827" stroke="#38BDF8" stroke-width="2"><animate attributeName="r" values="38;45;38" dur="3.2s" repeatCount="indefinite"/></circle><text x="160" y="101" fill="#BAE6FD">RETRIEVE</text>
    <circle cx="288" cy="44" r="34" fill="#111827" stroke="#8B5CF6" stroke-width="2"/><text x="265" y="49" fill="#DDD6FE">CRITIC</text>
    <circle cx="288" cy="150" r="34" fill="#111827" stroke="#FBBF24" stroke-width="2"/><text x="270" y="155" fill="#FEF3C7">CITE</text>
    <circle cx="374" cy="98" r="38" fill="#052E2B" stroke="#00D1B2" stroke-width="2"/><text x="348" y="103" fill="#99F6E4">ANSWER</text>
  </g>
  <text x="48" y="292" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="13">SYSTEM STATUS: planner graph | retrieval checks | cited final answer</text>
