<svg width="980" height="320" viewBox="0 0 980 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">End-to-End ML Pipeline with MLflow animated MLOps project card</title>
  <desc id="desc">Training, evaluation, MLflow tracking, FastAPI inference, Docker and GitHub Actions.</desc>
  <defs><radialGradient id="bg" cx="76%" cy="30%" r="72%"><stop offset="0" stop-color="#12335F"/><stop offset=".46" stop-color="#0B1220"/><stop offset="1" stop-color="#020617"/></radialGradient><linearGradient id="border" x1="0" y1="0" x2="980" y2="320"><stop stop-color="#00D1B2"/><stop offset="1" stop-color="#38BDF8"><animate attributeName="stop-color" values="#38BDF8;#00D1B2;#8B5CF6;#38BDF8" dur="10s" repeatCount="indefinite"/></stop></linearGradient><pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M32 0H0V32" stroke="#38BDF8" stroke-opacity=".08"/></pattern><filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <rect x="8" y="8" width="964" height="304" rx="28" fill="url(#bg)" stroke="url(#border)" stroke-width="2.5"/><rect x="24" y="24" width="932" height="272" rx="22" fill="url(#grid)" opacity=".9"/><rect x="34" y="278" width="912" height="2" fill="#00D1B2" opacity=".13"><animate attributeName="y" values="278;42;278" dur="8.4s" repeatCount="indefinite"/></rect>
